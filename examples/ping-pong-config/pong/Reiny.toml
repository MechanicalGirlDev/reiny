[project]
name = "pong"
version = "0.1.0"
description = "Ping を受けるたびに Pong を返す。返答文と遅延は設定で外出し。"
authors = ["nop <noplab90@gmail.com>"]
license = "MIT"

[publications]
Pong = { proto = "proto/pong.proto", message = "pong.Pong" }

[dependencies]
ping = { version = "0.1", path = "../ping" }

# 設定スキーマ + 既定値。reiny-build はここから型付き Config を生成し
# (`reiny::config::Config { reply: String, delay_ms: u64 }`)、起動時に外部の設定ファイル
# (launch config の `config = "..."`)で上書きできる。`cloudy.config()` で読む。
[config]
reply = "pong"   # 返答メッセージ
delay_ms = 0     # 受信から返球までの遅延(ms)
