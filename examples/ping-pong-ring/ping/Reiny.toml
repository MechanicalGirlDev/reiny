# Reiny.toml — reiny プロジェクトの宣言ファイル(Cargo.toml の reiny 版)。
# 「このプロジェクトが何という名前で動き、どんな型を公開し、どんな型に依存するか」
# を宣言する。reiny ランタイムはこれを読んでトピックと型を解決する。

[project]
# プロジェクト名 = プロセス/インスタンス名(ランチャのキー・liveliness id)。トピックではない。
name = "ping"
# プロジェクトと、公開する型スキーマのバージョン。購読側との互換判定に使う。
version = "0.1.0"
description = "Ping を打って Pong を待つ。リクエスト/レスポンス心拍の前半。"
authors = ["nop <noplab90@gmail.com>"]
license = "MIT"

# このプロジェクトが公開する型。型 Ping は publish 先 reiny/<id>/Ping(購読側は reiny/*/Ping)に対応。
# 型の実体は proto で定義し、ここで「公開する」と宣言する(複数列挙してよい)。
[publications]
Ping = { proto = "proto/ping.proto", message = "ping.Ping" }

# 依存する他プロジェクト。その [publications] で公開された型を購読できるようになる。
# pong に依存することで、pong が公開する Pong 型を reiny/*/Pong から受け取れる。
# version はセマンティックバージョン要求(pong 側の [project] version と突き合わせる)。
[dependencies]
pong = { version = "0.1", path = "../pong" }
