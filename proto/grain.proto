syntax = "proto3";
package hos;
import "types/time.proto";

// GUI grain announce 機構用メッセージ。grain(任意のプロセス)と hs-gui の間で、
// パネル構成の宣言(hos/<id>/gui/layout)・データ配信(hos/<id>/gui/data)・操作コマンド
// (hos/<id>/gui/command)に使う。Unity(teleop)は購読しない GUI↔grain 内部契約。
//
// 設計の肝:
// - hs-gui は proto スキーマに依存せず「汎用 key→value」だけを扱う。ウィジェットは
//   `bind_key` で GrainData.values のキーを参照し、レンダラはロボット固有の型を一切知らない。
// - grain の生存は Zenoh liveliness token(hos/<id>/gui)で表現する。token が消えると
//   hs-gui は当該タブを破棄する(= 遅延ロード/外部 grain の動的 出現/退場)。
// - layout は低レートで再 announce する(後から起動した hs-gui が拾えるように。CONFIG と同思想)。

// ウィジェットが表示/送出する 1 つの値。型は表示側が解釈する(数値→ラベル/ゲージ/グラフ、
// 真偽→トグル、文字列→ラベル/ドロップダウン選択 など)。
message GrainValue {
  oneof v {
    double number = 1;
    bool flag = 2;
    string text = 3;
    Vec3Value vec3 = 4;     // 3次元ベクトル(例: 移動速度指令 [vx, vy, ωz])。
    FloatArray array = 5;   // 可変長 float 配列(例: policy の観測 445 次元 / 行動 26 次元 / joint_target)。
  }
}

// 3次元ベクトル値。Controller ウィジェットの速度指令などに使う。
message Vec3Value {
  double x = 1;
  double y = 2;
  double z = 3;
}

// 可変長の数値配列。スカラ widget では表示できない構造化テレメトリ(policy の obs/action、
// joint_target など)を topics facet で運ぶために使う。hs-gui のスカラ widget は要約表示する。
message FloatArray {
  repeated double values = 1;
}

// ウィジェット 1 個の宣言。`id` は grain 内で一意で、command のルーティングに使う。
// `bind_key` は GrainData.values のキー(表示値の参照先)。操作系ウィジェットも、現在値を
// 表示するために bind_key を持てる(空なら未バインド)。
message GrainWidget {
  string id = 1;           // grain 内で一意。GrainCommand.widget_id と対応。
  string label = 2;        // 表示ラベル。
  string bind_key = 3;     // GrainData.values のキー(表示値)。空=バインドなし。

  oneof kind {
    LabelWidget label_widget = 10;
    GaugeWidget gauge = 11;
    GraphWidget graph = 12;
    ButtonWidget button = 13;
    SliderWidget slider = 14;
    ToggleWidget toggle = 15;
    DropdownWidget dropdown = 16;
    ControllerWidget controller = 17;
  }
}

// テキスト/数値の表示。数値は unit を後置する。
message LabelWidget {
  string unit = 1;        // 後置単位(任意)。
}

// 0..=1 でなく [min,max] 区間のゲージ(プログレス)バー。
message GaugeWidget {
  double min = 1;
  double max = 2;
  string unit = 3;
}

// 時系列ライングラフ。履歴は hs-gui 側がリングバッファで保持する(grain は現在値のみ送る)。
message GraphWidget {
  uint32 history = 1;     // 保持サンプル数(0 のとき hs-gui 既定)。
  double min = 2;         // y 軸下限。min==max のとき自動スケール。
  double max = 3;         // y 軸上限。
}

// 押下で GrainCommand(value=flag:true)を 1 回送出するボタン。
message ButtonWidget {
}

// 連続値スライダー。変化時に GrainCommand(value=number)を送出する。
message SliderWidget {
  double min = 1;
  double max = 2;
  double step = 3;        // 0 のとき連続。
}

// ON/OFF トグル。変化時に GrainCommand(value=flag)を送出する。
message ToggleWidget {
  // 現在状態は bind_key 経由(flag)で受ける。
}

// 選択肢ドロップダウン。選択時に GrainCommand(value=text:選択肢)を送出する。
message DropdownWidget {
  repeated string options = 1;
}

// 移動速度指令コントローラー。左右の X-Y ジョイスティック(マウスドラッグ)＋ WASD/QE キーボードと
// vx/vy/ωz 上限スライダーから、スケール済みの速度指令 [vx, vy, ωz] を生成する。表示・入力捕捉は
// hs-gui(ウィンドウ所有プロセス)が行い、毎フレーム GrainCommand(value=vec3)を送出する。
// 操作していない/タブ非表示のフレームはゼロを送る(デッドマン)。上限の既定値は hs-gui 側に従う。
message ControllerWidget {
}

// hos/<id>/gui/layout — パネル構成の宣言(grain -> hs-gui)。低レートで再 announce。
message GrainLayout {
  string grain_id = 1;           // 一意。liveliness token / トピックキーの <id> と一致させる。
  string title = 2;              // タブ見出し。
  repeated GrainWidget widgets = 3;
}

// hos/<id>/gui/data — ウィジェットへバインドする値(grain -> hs-gui)。任意レート。
message GrainData {
  string grain_id = 1;
  Timestamp timestamp = 2;
  map<string, GrainValue> values = 3;  // GrainWidget.bind_key で参照。
}

// hos/<id>/gui/command — ウィジェット操作(hs-gui -> grain)。
message GrainCommand {
  string grain_id = 1;
  Timestamp timestamp = 2;
  string widget_id = 3;          // 操作されたウィジェット(GrainWidget.id)。
  GrainValue value = 4;          // ボタン=flag:true / スライダー=number / トグル=flag / ドロップダウン=text。
}
