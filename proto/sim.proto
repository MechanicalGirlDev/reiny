syntax = "proto3";
package hos;
import "types/time.proto";

// 物理シム(`backend = "sim"`, physics 有効)専用メッセージ。hos/sim/* トピックで
// やり取りする。real backend では使われない。

// hos/sim/control — 物理シム制御コマンド (GUI -> hs-app sim backend)。
// physics の有効/無効切替とリセットを 1 トピックに集約する(estop/reset と同様)。
message SimControl {
  Timestamp timestamp = 1;
  oneof payload {
    bool set_physics_enabled = 2;  // true=物理ダイナミクス有効 / false=無効(現在姿勢で凍結)
    SimReset reset = 3;            // 物理リセット(home 復帰 + 全速度ゼロ)
    bool set_base_pinned = 4;      // true=浮遊ベースを現在姿勢で固定 / false=浮遊へ戻す(teleop/manual 安定化)
  }
}

// 物理リセット要求。現状フラグ無し(全リセット)。将来 reset_pose / zero_velocity 等を追加可能。
message SimReset {
}

// hos/sim/state — 物理シム状態 (hs-app -> GUI)。GUI のボタン状態表示に使う。
message SimState {
  Timestamp timestamp = 1;
  bool physics_enabled = 2;  // 現在の物理有効/無効
  uint64 step_count = 3;     // 物理ステップ累積回数(有効時のみ進む)
  bool base_pinned = 4;      // 現在のベース固定状態(true=固定 / false=浮遊)
}

// hos/sim/servo_load — 各関節のサーボ負荷 (hs-app -> GUI)。
// sim ではアクチュエータの適用 PD トルクから算出する(実機は将来モータ電流で供給)。
message ServoLoad {
  Timestamp timestamp = 1;
  repeated ServoLoadEntry entries = 2;  // config/sim 関節順
}

// 1 関節の負荷。torque=適用モータトルク[N·m](符号付き)、load_percent=|torque|/tau_max*100。
message ServoLoadEntry {
  string name = 1;
  float torque = 2;
  float tau_max = 3;
  float load_percent = 4;
}
