syntax = "proto3";
package hos;
import "types/time.proto";
import "types/geometry.proto";

// シーングラフ / オブジェクト管理用メッセージ。GUI(hs-gui)の Hierarchy パネルと
// hs-app(sim backend)の間で、シーン構造の配信(hos/scene/graph)と編集コマンド
// (hos/scene/control)に使う。Unity(teleop)は購読しない GUI↔hs-app 内部契約。
//
// 設計の肝: 構造+メタデータは変化時のみ低レートで hos/scene/graph に流し、姿勢は
// 従来どおり WorldState.tf に frame_id == object_id のエッジとして高速配信する。

// シーンノードの種別。
enum SceneObjectClass {
  SCENE_OBJECT_CLASS_UNSPECIFIED = 0;
  SCENE_OBJECT_CLASS_WORLD = 1;   // 合成ルート(姿勢なし)
  SCENE_OBJECT_CLASS_ROBOT = 2;   // 多関節ロボット(リンク部分木は WorldState.tf 側)
  SCENE_OBJECT_CLASS_GROUND = 3;  // 静的地面プレート
  SCENE_OBJECT_CLASS_PROP = 4;    // ユーザーが spawn した自由ボディ
}

// 直方体 half-extent(m)。
message BoxShape {
  float hx = 1;
  float hy = 2;
  float hz = 3;
}

// 球。
message SphereShape {
  float radius = 1;
}

// カプセル(Z 軸方向、両端半球)。
message CapsuleShape {
  float radius = 1;
  float half_height = 2;  // 円筒部の半長(m)
}

// 円柱(Z 軸方向)。
message CylinderShape {
  float radius = 1;
  float half_height = 2;
}

// 非 URDF オブジェクト(ground/prop)の描画記述子。robot/world は持たない。
message ShapeDescriptor {
  oneof shape {
    BoxShape box = 1;
    SphereShape sphere = 2;
    CapsuleShape capsule = 3;
    CylinderShape cylinder = 4;
  }
  // RGBA 0..1。
  float r = 10;
  float g = 11;
  float b = 12;
  float a = 13;
}

// シーンノード 1 つの構造 + メタデータ。posed なノード(ground/prop)の姿勢は
// frame_id == id の WorldState.tf エッジで運ぶ(ここには載せない)。
message SceneObject {
  string id = 1;                    // 安定一意 ID(posed なら tf frame_id と一致)
  string name = 2;                  // 表示名
  SceneObjectClass object_class = 3;
  string parent_id = 4;             // ルートは ""、トップレベルは "world"
  ShapeDescriptor visual = 5;       // ground/prop のみ。world/robot は未設定
  bool dynamic = 6;                 // 物理ダイナミック(prop) / 静的(ground)
}

// hos/scene/graph — シーン構造 + メタデータ(hs-app -> GUI)。変化時のみ配信。
message SceneGraph {
  Timestamp timestamp = 1;
  uint64 revision = 2;              // 構造変化ごとに増加
  repeated SceneObject objects = 3;
}

// 新規 prop の spawn 要求。
message SpawnProp {
  string name = 1;          // 表示名(空なら自動)
  ShapeDescriptor visual = 2;
  Pose pose = 3;            // 初期ワールド姿勢
  bool dynamic = 4;        // true=重力で落下 / false=静的
  float mass = 5;          // kg。<=0 なら密度由来の既定値
}

// オブジェクトの姿勢設定(テレポート)。id は prop か "robot"(ベース)のみ。
// link は FK 由来のため拒否される。
message SetObjectTransform {
  string id = 1;
  Pose pose = 2;
}

// hos/scene/control — シーン編集コマンド(GUI -> hs-app sim backend)。
message SceneControl {
  Timestamp timestamp = 1;
  oneof command {
    SpawnProp spawn = 2;
    string despawn_id = 3;            // prop を id で削除
    SetObjectTransform set_transform = 4;
  }
}
