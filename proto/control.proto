syntax = "proto3";
package hos;
import "types/geometry.proto";
import "types/time.proto";

// 操作系統
enum ControlMode {
  CONTROL_MODE_IDLE = 0;
  CONTROL_MODE_TELEOP = 1;
  CONTROL_MODE_MANUAL = 2;
  CONTROL_MODE_POLICY = 3;  // RL 移動ポリシー(hs-policy が joint_target を配信)
}

// hos/control/mode (操作系統切替)
message ControlModeCommand {
  Timestamp timestamp = 1;
  ControlMode mode = 2;
}

// hos/control/joint_target (ストリーミング / Manual モード)
// targets は config [[joint]] 宣言順に整列。rad(revolute) / 0..1(gripper)。
message JointTargets {
  Timestamp timestamp = 1;
  repeated float targets = 2;
}

// hos/control/command (イベント)
message ControlCommand {
  Timestamp timestamp = 1;
  oneof payload {
    SetTorque set_torque = 2;
    GoHome go_home = 3;
  }
}

// joint_indices が空 = 全関節。enabled=true:torque(保持) / false:free(脱力)。
message SetTorque {
  repeated uint32 joint_indices = 1;
  bool enabled = 2;
}

// joint_indices が空 = 全関節。
message GoHome {
  repeated uint32 joint_indices = 1;
}

// hos/control/estop
message EstopCommand {
  Timestamp timestamp = 1;
  bool triggered = 2;
}

// hos/control/reset (ソフトリセット)
message ResetCommand {
  Timestamp timestamp = 1;
}

// EE デカルト目標の出所
enum TargetSource {
  TARGET_SOURCE_UNKNOWN = 0;
  TARGET_SOURCE_UNITY = 1;   // Unity UDP TeleopCommand 由来
  TARGET_SOURCE_GIZMO = 2;   // hs-gui の 6-DOF Gizmo 由来
}

// 1 つの IK endpoint(制御点)へのデカルト目標。`chain` は config `[[chain]].name`
// (旧 left/right 固定を一般化した endpoint 名)。`pose` 未設定なら pose 無指令
// (グリッパのみ保持等)。`gripper` は 0..1。
message ChainTarget {
  string chain = 1;
  Pose pose = 2;
  float gripper = 3;
}

// EE デカルト目標。Unity UDP TeleopCommand と等価の Teleop 入力を Zenoh で授受する。
// 左右固定をやめ、endpoint 名(chain)キーの可変長リストに一般化した。Unity UDP 経路は
// 不変で、hs-app の境界アダプタが TeleopCommand の左右を chain 名へ橋渡しする。
//
//  - hos/control/cartesian_target (指令): Gizmo/外部 -> hs-app。Teleop モードで IK 駆動。
//  - hos/robot/teleop_target (echo): hs-app -> hs-gui。アクティブ目標の表示用。
//
// targets に含まれない endpoint は無指令(部分指令可)。トラフィック分離のため変化時のみ
// publish する。
message CartesianTarget {
  Timestamp timestamp = 1;
  repeated ChainTarget targets = 2;
  TargetSource source = 3;
}

// hos/control/command_velocity (移動速度指令ストリーミング) GUI -> hs-policy
// 離した瞬間にゼロが届く前提(デッドマン)。受信が無ければ policy は config 値を使う。
message VelocityCommand {
  Timestamp timestamp = 1;
  float vx = 2;       // 前後 [m/s] (+ 前進)
  float vy = 3;       // 横    [m/s] (+ 右)
  float omega_z = 4;  // 旋回  [rad/s] (+ 反時計回り/左旋回)
}

// hos/control/ik_params (Teleop IK チューニング) GUI -> hs-app
// Teleop の DLS IK ソルバの姿勢重みを実行時に調整する。位置重み(=1.0)に対する相対値で、
// 0.0 は純位置 IK(姿勢無視・可動域最大)、0.2 は既定の軟拘束(回転ギズモで緩く追従)、
// 1.0 以上は姿勢を硬く追従(完全 6-DOF 寄り・可動域は狭まる)。回転ギズモで姿勢を能動的に
// 指令するときに大きくする想定。
message IkParams {
  Timestamp timestamp = 1;
  float orientation_weight = 2;
}
