syntax = "proto3";
package hos;
import "types/geometry.proto";
import "types/time.proto";
import "types/tf.proto";
import "control.proto";

// 腕の状態
message ArmState {
  repeated float joint_angles = 1;    // 現在関節角度 (8軸)
  Pose current_pose = 2;              // 現在エンドエフェクタ位置
  float gripper_value = 3;
}

// 全身の関節状態 (config [[joint]] 宣言順)
message JointStatus {
  string name = 1;
  float angle = 2;          // rad(revolute) / 0..1(gripper)
  bool torque_enabled = 3;  // free/torque 状態
  float velocity = 4;       // rad/s(revolute)。未供給時は 0。
}

// IMU 1 サンプル(センサ/body フレーム)。hos/robot/imu。
// sim は hs-sim::base_imu()、実機は HAL の ImuDriver 実装が供給する(同一メッセージ)。
message ImuData {
  Timestamp timestamp = 1;
  Vector3 angular_velocity = 2;     // ジャイロ rad/s, body フレーム
  Vector3 linear_acceleration = 3;  // m/s^2, body フレーム(重力反力含む)
  Quaternion orientation = 4;       // body -> world (w,x,y,z)。未供給時は単位扱い。
}

// ロボット状態 (Rust -> Unity)
message RobotState {
  Timestamp timestamp = 1;
  ArmState left_arm = 2;
  ArmState right_arm = 3;
  SystemStatus status = 4;
  repeated JointStatus joints = 5;   // 全身(フェーズ2で生成)
  ControlMode control_mode = 6;      // 現在モード(GUI表示用)

  enum SystemStatus {
    OK = 0;
    WARNING = 1;
    ERROR = 2;
    EMERGENCY_STOP = 3;
  }
}

// エラー詳細（必要時）
message DiagnosticInfo {
  Timestamp timestamp = 1;
  repeated string warnings = 2;
  repeated string errors = 3;
}

// バックエンド非依存の全身ワールド状態（sim/real 共通）
message WorldState {
  Timestamp timestamp = 1;
  Pose base_pose = 2;
  repeated JointStatus joints = 3;
  repeated Transform tf = 4;
}
